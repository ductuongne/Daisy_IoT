<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-CAM Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="page-header">
        <h1>ESP32-CAM Security Dashboard</h1>
        <a href="/history" class="nav-link">View PIR History →</a>
    </div>

    <!-- Camera Stream -->
    <div class="card stream">

        <div class="section-title">
            Live Camera Stream
        </div>

        <img src="{{ stream_url }}/stream"
             alt="ESP32 Camera Stream">

    </div>

    <!-- Controls -->
    <div class="card">

        <div class="section-title">
            Device Controls
        </div>

        <div class="button-grid">

            <button id="cameraBtn"
                    class="btn-blue"
                    onclick="toggleDevice('camera')">
                Camera: OFF
            </button>

            <button id="emergencyBtn"
                    class="btn-orange"
                    onclick="toggleDevice('emergency')">
                Emergency: OFF
            </button>

            <button id="autoSirenBtn"
                    class="btn-green"
                    onclick="toggleDevice('autoSiren')">
                Auto Siren: OFF
            </button>

            <button id="pirBtn"
                    class="btn-red"
                    onclick="toggleDevice('pir')">
                PIR: OFF
            </button>

            <button class="btn-blue"
                    onclick="sendCommand('TRANG_THAI')">
                Refresh Status
            </button>

            <button class="btn-orange"
                    onclick="sendCommand('RESET')">
                Restart ESP
            </button>

        </div>

    </div>

    <!-- Alert -->
    <div id="alert"
         class="alert-box">
        ⚠ Motion Detected (PIR ALERT)
    </div>

    <!-- Status -->
    <div class="card">

        <div class="section-title">
            Device Status
        </div>

        <pre id="status"
             class="status-box">
Waiting for data...
        </pre>

    </div>

</div>

<script>

const deviceState = {
    camera: false,
    emergency: false,
    autoSiren: false,
    pir: false
};

function disableAllButtons()
{
    const buttons =
        document.querySelectorAll("button");

    buttons.forEach(btn =>
    {
        btn.disabled = true;
    });

    setTimeout(() =>
    {
        buttons.forEach(btn =>
        {
            btn.disabled = false;
        });
    }, 1000);
}

function sendCommand(command)
{
    disableAllButtons();

    fetch(`/cmd/${command}`)
        .then(() => console.log("Sent:", command))
        .catch(err => console.error(err));
}

function toggleDevice(device)
{
    disableAllButtons();

    let command = "";

    switch(device)
    {
        case "camera":

            deviceState.camera =
                !deviceState.camera;

            command =
                deviceState.camera
                ? "CAMERA_ON"
                : "CAMERA_OFF";

            document.getElementById("cameraBtn")
                .innerText =
                `Camera: ${
                    deviceState.camera
                    ? "ON"
                    : "OFF"
                }`;

            break;

        case "emergency":

            deviceState.emergency =
                !deviceState.emergency;

            command =
                deviceState.emergency
                ? "COIKC_ON"
                : "COIKC_OFF";

            document.getElementById("emergencyBtn")
                .innerText =
                `Emergency: ${
                    deviceState.emergency
                    ? "ON"
                    : "OFF"
                }`;

            break;

        case "autoSiren":

            deviceState.autoSiren =
                !deviceState.autoSiren;

            command =
                deviceState.autoSiren
                ? "COI_ON"
                : "COI_OFF";

            document.getElementById("autoSirenBtn")
                .innerText =
                `Auto Siren: ${
                    deviceState.autoSiren
                    ? "ON"
                    : "OFF"
                }`;

            break;

        case "pir":

            deviceState.pir =
                !deviceState.pir;

            command =
                deviceState.pir
                ? "CAMBIEN_ON"
                : "CAMBIEN_OFF";

            document.getElementById("pirBtn")
                .innerText =
                `PIR: ${
                    deviceState.pir
                    ? "ON"
                    : "OFF"
                }`;

            break;
    }

    fetch(`/cmd/${command}`)
        .then(() =>
            console.log("Sent:", command))
        .catch(console.error);
}

async function updateStatus()
{
    try
    {
        const response =
            await fetch("/status");

        const data =
            await response.json();

        document.getElementById("status")
            .innerText =
            JSON.stringify(data, null, 2);

        const alertBox =
            document.getElementById("alert");

        if (data.alert === true)
        {
            alertBox.style.display =
                "block";

            setTimeout(() =>
            {
                alertBox.style.display =
                    "none";
            }, 5000);
        }
    }
    catch(error)
    {
        console.error(error);
    }
}

setInterval(updateStatus, 1000);

updateStatus();

</script>

</body>
</html>
