<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIR Detection History</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="page-header">
        <h1>PIR Detection History</h1>
        <a href="/" class="nav-link">← Back to Dashboard</a>
    </div>

    <div id="historyList" class="history-list">
        <p class="empty-state">Loading detections...</p>
    </div>

</div>

<script>

function formatTime(value)
{
    if (!value)
    {
        return "—";
    }

    const normalized =
        value.includes("T")
            ? value
            : value.replace(" ", "T");

    const date = new Date(normalized);

    if (Number.isNaN(date.getTime()))
    {
        return value;
    }

    return date.toLocaleString();
}

function createDetectionCard(record)
{
    const card = document.createElement("div");
    card.className = "history-card";
    card.dataset.id = record.id;
    card.dataset.videoUrl = record.video_url;

    card.innerHTML = `
        <div class="history-card-header">
            <img src="${record.image_url}"
                 alt="Detection ${record.id}"
                 class="history-thumb">
            <div class="history-info">
                <div class="history-time">${formatTime(record.time)}</div>
                <div class="history-message">${record.message}</div>
                <div class="history-meta">${
                    record.stream_url
                        ? `Stream: ${record.stream_url}`
                        : `Image: ${record.image || "—"}`
                }</div>
                <div class="history-hint">Click to view recording</div>
            </div>
        </div>
        <div class="history-video-panel" hidden>
            <video controls playsinline></video>
            <p class="video-error" hidden>
                Video could not play. Run:
                <code>python scripts/reencode_videos.py</code>
            </p>
        </div>
    `;

    const panel =
        card.querySelector(".history-video-panel");
    const video =
        card.querySelector("video");
    const errorEl =
        card.querySelector(".video-error");

    video.addEventListener("error", () =>
    {
        errorEl.hidden = false;
    });

    card.addEventListener("click", () =>
    {
        const isOpen =
            !panel.hidden;

        document.querySelectorAll(".history-video-panel")
            .forEach(p => p.hidden = true);

        document.querySelectorAll(".history-card")
            .forEach(c => c.classList.remove("active"));

        document.querySelectorAll("video")
            .forEach(v =>
            {
                v.pause();
                v.removeAttribute("src");
                v.load();
            });

        document.querySelectorAll(".video-error")
            .forEach(e => e.hidden = true);

        if (!isOpen)
        {
            panel.hidden = false;
            card.classList.add("active");
            video.src = card.dataset.videoUrl;
            video.load();
            video.play().catch(() => {});
        }
    });

    return card;
}

async function loadHistory()
{
    const list =
        document.getElementById("historyList");

    try
    {
        const response =
            await fetch("/api/history");

        const records =
            await response.json();

        list.innerHTML = "";

        if (!records.length)
        {
            list.innerHTML =
                '<p class="empty-state">No PIR detections recorded yet.</p>';
            return;
        }

        records.forEach(record =>
        {
            list.appendChild(
                createDetectionCard(record));
        });
    }
    catch (error)
    {
        console.error(error);
        list.innerHTML =
            '<p class="empty-state">Failed to load history.</p>';
    }
}

loadHistory();

</script>

</body>
</html>
